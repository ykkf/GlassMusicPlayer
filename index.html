<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Music Player</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Google Material Symbols (アイコン用) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,300,0,0" rel="stylesheet">
    
    <!-- PWA用 Metaタグ -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#060913">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Service Worker 登録 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed: ', err));
            });
        }
    </script>
    
    <!-- jsmediatags (MP3のID3タグ/アルバムアート読み込み用) -->
    <!-- Electron環境ではnode_modulesから読み込み、ブラウザではCDNから読み込み -->
    <script>
        try {
            // Electron環境：node_modulesからロード
            if (typeof require !== 'undefined') {
                window.jsmediatags = require('jsmediatags');
            }
        } catch(e) {
            // ブラウザ環境: 何もしない（CDNフォールバックを後で読み込む）
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js" defer></script>
    
    <style>
        /* =========================================================
           変数定義・全体設定
           ========================================================= */
        :root {
            --glass-bg: rgba(20, 25, 30, 0.45); /* より暗く高級感のあるガラス背景 */
            --glass-border: rgba(255, 255, 255, 0.12); /* 極細の白いボーダー */
            --glass-highlight: rgba(255, 255, 255, 0.05); /* 控えめな光沢 */
            --text-primary: #ffffff; /* メインテキスト */
            --text-secondary: rgba(255, 255, 255, 0.55); /* サブテキスト */
            --accent: #00e5ff; /* ワンポイントのシアン */
            --accent-glow: rgba(0, 229, 255, 0.3); /* シアンの控えめな発光 */
            --track-bg: rgba(255, 255, 255, 0.1); /* 未再生部分は薄く */
            --bg-gradient-1: #060913;
            --bg-gradient-2: #12182b;
            --bg-gradient-3: #0c1524;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* テキスト選択を無効化 */
        }

        /* 背景（Electronでは透明、ブラウザではグラデーション） */
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background: transparent; /* Electronの透明ウィンドウを活かす */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-weight: 400;
        }

        /* カード内部のガラス背景層（backdrop-filterの代わりに実物の背景を提供） */
        .glass-bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg,
                rgba(15, 20, 35, 0.92),
                rgba(10, 15, 30, 0.88) 40%,
                rgba(8, 18, 38, 0.90) 70%,
                rgba(12, 22, 40, 0.92)
            );
            border-radius: 28px;
            z-index: 0;
            pointer-events: none;
        }

        /* カードのガラス光沢オーバーレイ（上部の反射光） */
        .glass-highlight-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg,
                rgba(255, 255, 255, 0.08) 0%,
                rgba(255, 255, 255, 0.02) 40%,
                transparent 100%
            );
            border-radius: 28px 28px 0 0;
            z-index: 1;
            pointer-events: none;
        }

        /* プレイヤーカード内の波形キャンバス */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.35; /* カード内なので少し見えるように */
            pointer-events: none; /* クリックの影響を受けない */
            border-radius: 28px; /* カードの角丸に合わせる */
        }

        /* =========================================================
           Electron用 ドラッグバー領域
           ========================================================= */
        .titlebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-app-region: drag; /* Electronでドラッグ可能にする */
            z-index: 1000;
            background: transparent;
        }

        .titlebar .title {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 3px;
            color: var(--text-secondary);
            text-transform: uppercase;
            opacity: 0.4;
            transition: opacity 0.4s ease;
        }
        
        .titlebar:hover .title {
            opacity: 1;
        }

        /* ウィンドウコントロール（最小化・閉じるボタン） */
        .window-controls {
            position: absolute;
            top: 0;
            right: 0;
            height: 48px;
            display: flex;
            align-items: center;
            gap: 0;
            z-index: 1001;
            -webkit-app-region: no-drag; /* ボタンはドラッグ無効 */
        }

        .window-controls button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 44px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            transition: all 0.2s ease;
            border-radius: 0;
        }

        .window-controls button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .window-controls button.active {
            color: var(--accent); /* ピン留め有効時はアクセントカラー */
        }

        .window-controls .btn-close:hover {
            background: rgba(232, 17, 35, 0.8); /* 閉じるボタンは赤色 */
            color: #fff;
        }

        .window-controls .btn-close {
            border-radius: 0 28px 0 0; /* カードの右上の角丸に合わせる */
        }

        /* ミニモード切り替えボタン用 */
        .window-controls #btn-mini {
            font-size: 16px; /* アイコンを少し大きく表示できるように */
        }

        /* ユーザーが操作する要素はドラッグ無効化 */
        input, button, .playlist-item, label {
            -webkit-app-region: no-drag;
        }

        /* =========================================================
           プレイヤーカード UI (フロストガラス)
           ========================================================= */
        .player-card {
            width: 330px;
            background: rgba(15, 20, 35, 0.4); /* ガラス感のある半透明 */
            backdrop-filter: blur(40px) saturate(1.2); /* ブラー効果を強化 */
            -webkit-backdrop-filter: blur(40px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.15); /* 少し明るいボーダー */
            border-top: 1px solid rgba(255, 255, 255, 0.25); /* 上部ハイライトを強めに */
            border-radius: 28px;
            padding: 56px 32px 32px; /* 上部パディングを増やしウィンドウコントロールとの被りを防止 */
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.05), /* 薄い外側ラインのみ残す */
                inset 0 1px 0 rgba(255, 255, 255, 0.12), /* 上部のハイライト */
                inset 0 -1px 0 rgba(0, 0, 0, 0.2), /* 下部の影 */
                inset 0 0 60px rgba(255, 255, 255, 0.03); /* 内側の微かな光 */
            display: flex;
            flex-direction: column;
            gap: 24px; /* パディング増加分、隙間をやや詰める */
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1),
                        box-shadow 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            margin-top: 20px;
            z-index: 10;
            position: relative;
            overflow: hidden;
            height: 700px;
        }

        .player-card:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.18),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2),
                inset 0 0 60px rgba(255, 255, 255, 0.04);
        }

        /* =========================================================
           前面コンテンツの配置設定 (背景層より上に表示する)
           ========================================================= */
        .player-card > .album-container,
        .player-card > .info,
        .player-card > .progress-wrapper,
        .player-card > .controls,
        .player-card > .utils-wrapper,
        .player-card > .playlist-section {
            position: relative;
            z-index: 10;
        }

        /* =========================================================
           アルバムアート (大きく強調)
           ========================================================= */
        .album-container {
            width: 250px; 
            height: 250px;
            margin: 0 auto;
            border-radius: 20px; /* 少し大きめのRで柔らかく */
            overflow: hidden;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.6), 
                inset 0 0 0 1px rgba(255,255,255,0.08); /* さりげない枠 */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.5s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.5s ease;
        }

        /* 再生時の浮遊感アニメーション */
        .album-container.playing {
            transform: scale(1.03) translateY(-5px);
            box-shadow: 
                0 35px 60px rgba(0,0,0,0.7),
                0 15px 40px var(--accent-glow), /* 再生中はアクセントカラーの影 */
                inset 0 0 0 1px rgba(255,255,255,0.1);
        }

        .album-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease;
        }

        .album-placeholder {
            position: absolute;
            color: rgba(255, 255, 255, 0.08);
            font-size: 80px;
            font-weight: 300;
        }

        /* =========================================================
           曲情報テキスト
           ========================================================= */
        .info {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info h2 {
            font-size: 21px;
            font-weight: 600;
            letter-spacing: -0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); /* 視認性向上のための影 */
        }

        .info p {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.3px;
        }

        /* =========================================================
           シークバー・時間
           ========================================================= */
        .progress-wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .time-wrapper {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.5px;
            padding: 0 4px; /* バーの幅に合わせる */
        }

        /* カスタムレンジスライダー (シークバー & 音量共有) */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            outline: none;
            height: 24px; /* タッチ領域確保（少し広げる） */
            margin: -9px 0; /* 見た目の高さを調整 */
            cursor: pointer;
        }

        /* Track のデザイン */
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 3px; /* 高さを4-6pxからさらに薄い3pxへ */
            background: var(--track-bg); /* JSで上書きされるベース色 */
            border-radius: 3px;
            transition: height 0.2s ease, background 0.1s linear;
        }

        /* Hover 時少しだけ太くする */
        input[type="range"]:hover::-webkit-slider-runnable-track {
            height: 4px;
        }

        /* Thumb (つまみ) のデザイン */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px; /* つまみも少し小さめにしてミニマルに */
            height: 10px;
            background: var(--text-primary); /* 白くくっきり */
            border-radius: 50%;
            margin-top: -3.5px; /* (Track Height 3px / 2) - (Thumb Height 10px / 2) */
            box-shadow: 0 0 10px rgba(0,0,0,0.5), 0 0 5px var(--accent-glow);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
            opacity: 1; /* 見えるようにする */
            transform: scale(0.6); /* 普段は極小 */
        }

        input[type="range"]:hover::-webkit-slider-thumb,
        input[type="range"]:active::-webkit-slider-thumb {
            transform: scale(1.3); /* ホバーで大きく */
            background: var(--accent); /* ホバーでアクセント色に光る */
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* =========================================================
           コントロールボタン (再生、次、前)
           ========================================================= */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 22px;
        }

        .btn {
            background: transparent;
            border: 1px solid transparent; 
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border-radius: 50%;
            width: 46px;
            height: 46px;
        }

        .btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.05); /* 軽く浮く */
        }

        .btn:active {
            transform: scale(0.92); /* 押下時に縮む */
            background: rgba(255, 255, 255, 0.15);
        }

        /* 再生/一時停止ボタン */
        .btn-main {
            width: 62px;
            height: 62px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: var(--text-primary);
            box-shadow: 
                0 10px 25px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .btn-main:hover {
            background: rgba(255, 255, 255, 0.25);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 15px 30px rgba(0,0,0,0.4), 
                0 0 20px var(--accent-glow), /* アクセントの光 */
                inset 0 1px 0 rgba(255,255,255,0.2);
            transform: scale(1.08); /* メインボタンはさらに大きく */
        }

        .btn-main:active {
            transform: scale(0.95);
        }

        .btn .material-symbols-rounded { font-size: 28px; font-weight: 300; }
        .btn-main .material-symbols-rounded { font-size: 34px; font-weight: 400; }

        /* =========================================================
           ユーティリティエリア (音量 & プレイリストボタン)
           ========================================================= */
        .utils-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: -6px; 
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .volume-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            padding-right: 24px;
        }

        .volume-wrapper .material-symbols-rounded {
            font-size: 20px;
            color: var(--text-secondary);
            font-weight: 300;
        }
        
        /* プレイリスト表示切り替えトグル（アイコン） */
        .playlist-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .playlist-toggle:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.08);
            transform: scale(1.05);
        }
        
        .playlist-toggle:active {
            transform: scale(0.9);
        }

        /* =========================================================
           3D Audio パネル
           ========================================================= */
        .panel-3d {
            position: absolute;
            bottom: 60px;
            right: 15px;
            width: 220px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .panel-3d.show {
            display: flex;
            animation: fadeIn 0.2s ease-out forwards;
        }
        .panel-3d .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        /* トグルスイッチ */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider-round {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: .3s;
            border-radius: 34px;
        }
        .slider-round:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        .toggle-switch input:checked + .slider-round {
            background-color: var(--accent);
        }
        .toggle-switch input:checked + .slider-round:before {
            transform: translateX(14px);
        }

        /* パネル内のスライダー */
        .panel-3d input[type="range"] {
            flex-grow: 1;
            margin-left: 10px;
            height: 4px;
        }

        /* =========================================================
           EQ パネル
           ========================================================= */
        .panel-eq {
            display: none;
            flex-direction: column;
            gap: 12px;
            padding: 14px;
            background: rgba(40, 40, 40, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 12px;
            position: absolute;
            bottom: 60px;
            right: 20px;
            width: 280px;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.2s ease-out forwards;
        }
        .panel-eq.show {
            display: flex;
        }
        .preset-row {
            display: flex;
            gap: 6px;
            justify-content: space-between;
        }
        .preset-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-size: 11px;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }
        .preset-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }
        .preset-btn.active {
            background: rgba(0, 229, 255, 0.2);
            border-color: rgba(0, 229, 255, 0.5);
            color: var(--accent);
        }
        
        .eq-sliders {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .eq-slider-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .eq-slider-wrapper label {
            width: 45px;
        }
        .eq-slider-wrapper input[type="range"] {
            flex-grow: 1;
            margin-left: 8px;
            height: 4px;
        }

        /* =========================================================
           プレイリストセクション (折りたたみ式)
           ========================================================= */
        .playlist-section {
            display: none; /* デフォルトは非表示 */
            flex-direction: column;
            gap: 16px;
            padding-top: 8px;
            animation: fadeIn 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        
        .playlist-section.show {
            display: flex;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .file-input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
        }

        /* フォルダ参照ボタン (大きく押しやすく) */
        .btn-folder {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 0;
            width: 100%;
            text-align: center;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .btn-folder:hover {
            color: var(--accent);
            border-color: rgba(0, 229, 255, 0.4);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.15);
            transform: translateY(-2px);
        }
        
        .btn-folder:active {
            transform: translateY(1px);
        }
        
        .btn-folder .material-symbols-rounded {
            font-size: 20px;
        }

        .playlist {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1; /* 残りのスペースを埋める */
            padding-right: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* カスタムスクロールバー 極細 */
        .playlist::-webkit-scrollbar {
            width: 4px;
        }
        .playlist::-webkit-scrollbar-track {
            background: transparent;
        }
        .playlist::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
        }
        .playlist:hover::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
        }

        .playlist-item {
            padding: 10px 14px;
            border-radius: 12px;
            background: transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
        }

        .playlist-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        .playlist-item.active {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--accent); /* 再生中をアクセントカラーで強調 */
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .playlist-item .material-symbols-rounded {
            font-size: 18px;
            font-weight: 300;
            opacity: 0.6;
        }
        
        .playlist-item.active .material-symbols-rounded {
            opacity: 1;
        }

        /* =========================================================
           レスポンシブ (スマホ対応)
           ========================================================= */
        @media (max-width: 480px) {
            .player-card {
                width: 88%;
                padding: 32px 24px 24px;
                border-radius: 24px;
                gap: 22px;
            }
            .album-container {
                width: 210px;
                height: 210px;
            }
            .btn-main {
                width: 56px;
                height: 56px;
            }
        }

        /* =========================================================
           ミニモード (高さを抑える)
           ========================================================= */
        body.mini-mode .player-card {
            height: 240px;
            padding: 40px 32px 20px;
            gap: 16px;
            justify-content: flex-start;
        }

        /* ミニモード時は一部要素のみ非表示 */
        body.mini-mode .utils-wrapper,
        body.mini-mode .playlist-section {
            display: none !important;
        }

        /* ミニモード時のアルバムアート（薄く背景に表示） */
        body.mini-mode .album-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            border-radius: 0;
            z-index: 1; /* canvasより上で、コンテンツより下 */
            opacity: 0.35; /* 15% -> 35% に上げて視認性をアップ */
            filter: blur(8px); /* ぼかしを少し弱めて元の画像がわかりやすく */
            pointer-events: none;
            box-shadow: none;
            background: transparent;
        }

        body.mini-mode .album-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        body.mini-mode .album-placeholder {
            display: none !important;
        }

        /* ミニモードで他の要素をアルバム背景より上に表示 */
        body.mini-mode .info,
        body.mini-mode .progress-wrapper,
        body.mini-mode .controls {
            z-index: 10;
            position: relative;
        }

        /* プレイリスト展開時のセクション構造調整（固定高さ用） */
        .playlist-section {
            display: none; 
            flex-direction: column;
            gap: 16px;
            padding-top: 8px;
            overflow: hidden; /* 中身のスクロールをplaylistに任せる */
            flex: 1; /* カード下部全体を使う */
            animation: fadeIn 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* 波形の表示領域もカードに合わせて修正 */
        body.mini-mode #bg-canvas {
            border-radius: 28px;
            height: 100%;
        }

        body.mini-mode .info h2 {
            font-size: 16px;
        }

        body.mini-mode .controls {
            margin-top: -6px;
        }

        /* =========================================================
           スマートフォン用レスポンシブデザイン (PWA向け)
           ========================================================= */
        @media (max-width: 600px) and (pointer: coarse) {
            body {
                background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
                align-items: flex-start; /* 上寄せにする */
            }

            .player-card {
                width: 100vw;
                height: 100vh;
                margin-top: 0;
                border-radius: 0;
                border: none; /* ボーダー不要 */
                padding: 40px 24px 24px;
                box-shadow: none;
                gap: 20px;
                overflow-y: auto; /* 長い場合スクロール可 */
                /* スマホではElectron用のHoverアニメーションを無効化 */
                transform: none !important;
            }

            .player-card:hover {
                transform: none;
                box-shadow: none;
            }

            /* ウィンドウ操作コントロール類は不要なので非表示 */
            .titlebar, .window-controls {
                display: none !important;
            }

            /* ガラス背景と光沢も不要なら非表示にするか、全画面に合わせる */
            .glass-bg-layer, .glass-highlight-layer {
                border-radius: 0;
            }
            .glass-highlight-layer {
                height: 30%; /* 面積を小さく */
            }

            /* アルバムアートのサイズ調整 */
            .album-container {
                width: 280px;
                height: 280px;
                margin-top: 16px;
                box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            }

            /* 各種ボタンのタップ領域を拡大 */
            .controls .btn {
                width: 60px;
                height: 60px;
            }
            .controls .btn span {
                font-size: 28px;
            }
            .controls .btn-main {
                width: 72px;
                height: 72px;
            }
            .controls .btn-main span {
                font-size: 36px;
            }

            /* シークバーなどの余白 */
            .progress-wrapper {
                margin: 8px 0;
            }
            .utils-wrapper {
                margin-top: 8px;
            }

            /* Playlistの最適化 */
            .playlist-section {
                gap: 12px;
                overflow: visible; /* 親でスクロール */
            }
            .playlist-item {
                padding: 14px 12px; /* タップ領域広く */
            }
        }
    </style>
</head>
<body>

    <!-- プレイヤーUI -->
    <div class="player-card">
        
        <!-- ガラス背景層（フロストガラスの質感を出す） -->
        <div class="glass-bg-layer"></div>
        <!-- ガラス光沢層（上部の反射光） -->
        <div class="glass-highlight-layer"></div>
        
        <!-- ウィンドウドラッグ用ヘッダー（カード内に移動） -->
        <div class="titlebar">
            <span class="title">Glass Player</span>
        </div>

        <!-- ウィンドウコントロール（最小化・ピン留め・ミニモード・閉じる） -->
        <div class="window-controls">
            <button id="btn-minimize" title="最小化">─</button>
            <button id="btn-pin" title="常に手前に表示"><span class="material-symbols-rounded" style="font-size:16px;">push_pin</span></button>
            <button id="btn-mini" title="ミニモード / 通常モード切替"><span class="material-symbols-rounded" style="font-size:16px;">picture_in_picture_alt</span></button>
            <button id="btn-close" class="btn-close" title="閉じる">✕</button>
        </div>
        
        <!-- プレイヤーカード内の波形アニメーション -->
        <canvas id="bg-canvas"></canvas>
        
        <!-- アルバムアート -->
        <div class="album-container" id="album-container">
            <span class="material-symbols-rounded album-placeholder" id="album-placeholder">music_note</span>
            <img id="album-art" src="" alt="Album Art" style="display: none;">
        </div>

        <!-- 曲情報 -->
        <div class="info">
            <h2 id="track-name">Select a track</h2>
            <p id="artist-name">Artist</p>
        </div>

        <!-- シークバー -->
        <div class="progress-wrapper">
            <input type="range" id="seek-bar" min="0" max="100" value="0">
            <div class="time-wrapper">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <!-- コントローラー -->
        <div class="controls">
            <button class="btn" id="prev-btn" title="Previous">
                <span class="material-symbols-rounded">skip_previous</span>
            </button>
            <button class="btn btn-main" id="play-btn" title="Play/Pause">
                <span class="material-symbols-rounded" id="play-icon">play_arrow</span>
            </button>
            <button class="btn" id="next-btn" title="Next">
                <span class="material-symbols-rounded">skip_next</span>
            </button>
        </div>

        <!-- ボトムエリア (音量 & プレイリストトグル) -->
        <div class="utils-wrapper">
            <!-- 音量 -->
            <div class="volume-wrapper">
                <span class="material-symbols-rounded" id="vol-icon">volume_up</span>
                <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="0.5">
            </div>
            
            <div style="display: flex; gap: 4px;">
                <!-- シャッフル -->
                <button class="playlist-toggle" id="shuffle-btn" title="Shuffle">
                    <span class="material-symbols-rounded">shuffle</span>
                </button>
                <!-- EQ トグル -->
                <button class="playlist-toggle" id="btn-eq" title="Equalizer (EQ)">
                    <span class="material-symbols-rounded">graphic_eq</span>
                </button>
                <!-- 3D Audio トグル -->
                <button class="playlist-toggle" id="btn-3d" title="3D Audio (立体音響)">
                    <span class="material-symbols-rounded">spatial_audio</span>
                </button>
                <button class="playlist-toggle" id="playlist-toggle" title="Toggle Playlist">
                    <span class="material-symbols-rounded">queue_music</span>
                </button>
            </div>
        </div>

        <!-- EQ パネル (初期非表示) -->
        <div class="panel-eq" id="panel-eq">
            <div class="preset-row">
                <button class="preset-btn active" data-preset="normal">Normal</button>
                <button class="preset-btn" data-preset="bass">Bass</button>
                <button class="preset-btn" data-preset="vocal">Vocal</button>
                <button class="preset-btn" data-preset="treble">Treble</button>
            </div>
            
            <div class="eq-sliders">
                <div class="eq-slider-wrapper">
                    <label>Bass</label>
                    <input type="range" class="eq-slider" id="eq-bass" min="-10" max="10" step="0.1" value="0">
                </div>
                <div class="eq-slider-wrapper">
                    <label>Mid</label>
                    <input type="range" class="eq-slider" id="eq-mid" min="-10" max="10" step="0.1" value="0">
                </div>
                <div class="eq-slider-wrapper">
                    <label>Treble</label>
                    <input type="range" class="eq-slider" id="eq-treble" min="-10" max="10" step="0.1" value="0">
                </div>
            </div>
        </div>

        <!-- 3D Audio パネル (初期非表示) -->
        <div class="panel-3d" id="panel-3d">
            <div class="row">
                <span>3D Audio (立体音響)</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-3d-effect">
                    <span class="slider-round"></span>
                </label>
            </div>
            <div class="row">
                <span>空間 (Reverb)</span>
                <input type="range" id="slider-reverb" min="0" max="1" step="0.01" value="0.3" disabled>
            </div>
            <div class="row">
                <span>Auto-Pan (自動移動)</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-auto-pan" disabled>
                    <span class="slider-round"></span>
                </label>
            </div>
        </div>

        <!-- プレイリスト (初期非表示) -->
        <div class="playlist-section" id="playlist-section">
            <div class="file-input-wrapper" style="display: flex; gap: 8px; padding: 0 4px;">
                <!-- Electronのみ表示されるフォルダ参照ボタン -->
                <button class="btn-folder" id="btn-select-folder" style="display: none; flex: 1;">
                    <span class="material-symbols-rounded">folder_open</span>
                    Music Folder
                </button>
                <!-- Web/PWA環境用 フォルダ選択ボタン -->
                <button class="btn-folder" id="btn-web-folder" style="flex: 1;">
                    <span class="material-symbols-rounded">folder_open</span>
                    Select Folder
                </button>
                <!-- webkitdirectoryフォールバック用（非表示） -->
                <input type="file" id="folder-input-fallback" webkitdirectory directory multiple style="display: none;">
            </div>
            <ul class="playlist" id="playlist">
                <!-- 曲一覧がJavaScriptで追加されます -->
            </ul>
        </div>

    </div>

    <script>
        // =========================================================
        // アプリケーションの状態とDOM要素の取得
        // =========================================================
        const audio = new Audio();
        let playlistFiles = [];
        let currentTrackIndex = -1;

        // UI要素
        const playlistEl = document.getElementById('playlist');
        const playlistSection = document.getElementById('playlist-section');
        const playlistToggle = document.getElementById('playlist-toggle');
        
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        let isShuffle = false;
        const seekBar = document.getElementById('seek-bar');
        const volumeBar = document.getElementById('volume-bar');
        const volIcon = document.getElementById('vol-icon');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        
        const btn3d = document.getElementById('btn-3d');
        const panel3d = document.getElementById('panel-3d');
        const toggle3dEffect = document.getElementById('toggle-3d-effect');
        const sliderReverb = document.getElementById('slider-reverb');
        const toggleAutoPan = document.getElementById('toggle-auto-pan');
        
        const btnEq = document.getElementById('btn-eq');
        const panelEq = document.getElementById('panel-eq');
        const presetBtns = document.querySelectorAll('.preset-btn');
        const eqBassSlider = document.getElementById('eq-bass');
        const eqMidSlider = document.getElementById('eq-mid');
        const eqTrebleSlider = document.getElementById('eq-treble');
        
        const trackNameEl = document.getElementById('track-name');
        const artistNameEl = document.getElementById('artist-name');
        const albumArtEl = document.getElementById('album-art');
        const albumPlaceholder = document.getElementById('album-placeholder');
        const albumContainer = document.getElementById('album-container');

        // =========================================================
        // Electronウィンドウコントロール & ミニモード
        // =========================================================
        // preload.js経由で公開されたAPIを使う（ブラウザでは何もしない）
        const btnMinimize = document.getElementById('btn-minimize');
        const btnMini = document.getElementById('btn-mini');
        const btnPin = document.getElementById('btn-pin');
        const btnClose = document.getElementById('btn-close');
        
        let isMiniMode = false;
        let isAlwaysOnTop = false;
        
        const btnSelectFolder = document.getElementById('btn-select-folder');
        const btnWebFolder = document.getElementById('btn-web-folder');
        const folderInputFallback = document.getElementById('folder-input-fallback');

        if (window.electronAPI) {
            // Electron機能を利用可能な場合、ボタンを表示し代替を隠す
            if (btnSelectFolder) btnSelectFolder.style.display = 'flex';
            if (btnWebFolder) btnWebFolder.style.display = 'none';
            
            btnMinimize.addEventListener('click', () => window.electronAPI.minimize());
            btnClose.addEventListener('click', () => window.electronAPI.close());
            
            // 常に手前に表示（ピン留め）
            btnPin.addEventListener('click', () => {
                isAlwaysOnTop = !isAlwaysOnTop;
                window.electronAPI.toggleAlwaysOnTop(isAlwaysOnTop);
                
                if (isAlwaysOnTop) {
                    btnPin.classList.add('active');
                    btnPin.title = "常に手前に表示（解除）";
                } else {
                    btnPin.classList.remove('active');
                    btnPin.title = "常に手前に表示";
                }
            });
            
            btnMini.addEventListener('click', () => {
                isMiniMode = !isMiniMode;
                document.body.classList.toggle('mini-mode', isMiniMode);
                window.electronAPI.toggleMiniMode(isMiniMode);
                
                // アイコンの切り替え
                const icon = btnMini.querySelector('span');
                if (isMiniMode) {
                    icon.textContent = 'aspect_ratio';
                    btnMini.title = "通常モードに戻す";
                } else {
                    icon.textContent = 'picture_in_picture_alt';
                    btnMini.title = "ミニモードにする";
                }
                
                // モード切替時にキャンバスのサイズもリサイズ
                setTimeout(resize, 50);
            });

            // ===================================
            // 追加：フォルダ記憶機能の組み込み
            // ===================================
            btnSelectFolder.addEventListener('click', async () => {
                const files = await window.electronAPI.selectFolder();
                if (files && files.length > 0) {
                    playlistFiles = files;
                    currentTrackIndex = -1;
                    renderPlaylist();
                    loadTrack(0);
                    setTimeout(() => audio.play().catch(console.error), 100);
                }
            });

            // 起動時に保存されたフォルダがあれば読み込む (jsmediatagsロード完了を待つ)
            window.addEventListener('load', () => {
                window.electronAPI.getSavedFolder().then(files => {
                    if (files && files.length > 0) {
                        playlistFiles = files;
                        renderPlaylist();
                        loadTrack(0);
                    }
                });
            });

        } else {
            // ブラウザ環境ではウィンドウコントロールを非表示にする
            const controls = document.querySelector('.window-controls');
            if (controls) controls.style.display = 'none';
        }

        // =======================================================
        // PWA・Web環境用: フォルダ選択・読み込み・永続化
        // =======================================================
        const AUDIO_EXTENSIONS = ['.mp3', '.wav', '.ogg', '.flac', '.aac', '.m4a', '.wma', '.webm'];

        /** IndexedDBにディレクトリハンドルを保存 */
        function saveDirectoryHandle(handle) {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('GlassMusicPlayerDB', 1);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('settings')) {
                        db.createObjectStore('settings');
                    }
                };
                req.onsuccess = (e) => {
                    const db = e.target.result;
                    const tx = db.transaction('settings', 'readwrite');
                    tx.objectStore('settings').put(handle, 'directoryHandle');
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                };
                req.onerror = () => reject(req.error);
            });
        }

        /** IndexedDBからディレクトリハンドルを復元 */
        function loadDirectoryHandle() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('GlassMusicPlayerDB', 1);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('settings')) {
                        db.createObjectStore('settings');
                    }
                };
                req.onsuccess = (e) => {
                    const db = e.target.result;
                    const tx = db.transaction('settings', 'readonly');
                    const getReq = tx.objectStore('settings').get('directoryHandle');
                    getReq.onsuccess = () => resolve(getReq.result || null);
                    getReq.onerror = () => resolve(null);
                };
                req.onerror = () => resolve(null);
            });
        }

        /** ディレクトリハンドルから音楽ファイルを取得 */
        async function readAudioFilesFromHandle(dirHandle) {
            const tracks = [];
            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const lowerName = entry.name.toLowerCase();
                    if (AUDIO_EXTENSIONS.some(ext => lowerName.endsWith(ext))) {
                        const file = await entry.getFile();
                        tracks.push({
                            name: file.name,
                            path: URL.createObjectURL(file),
                            isElectronFile: false,
                            rawFile: file
                        });
                    }
                }
            }
            tracks.sort((a, b) => a.name.localeCompare(b.name));
            return tracks;
        }

        /** File配列から音楽ファイルのみフィルタリング (webkitdirectoryフォールバック用) */
        function filterAudioFiles(fileList) {
            return Array.from(fileList).filter(file => {
                const lowerName = file.name.toLowerCase();
                return AUDIO_EXTENSIONS.some(ext => lowerName.endsWith(ext));
            }).map(file => ({
                name: file.name,
                path: URL.createObjectURL(file),
                isElectronFile: false,
                rawFile: file
            })).sort((a, b) => a.name.localeCompare(b.name));
        }

        if (btnWebFolder) {
            btnWebFolder.addEventListener('click', async () => {
                // File System Access API が使えるか確認
                if ('showDirectoryPicker' in window) {
                    try {
                        const dirHandle = await window.showDirectoryPicker({ mode: 'read' });
                        const tracks = await readAudioFilesFromHandle(dirHandle);
                        if (tracks.length > 0) {
                            playlistFiles = tracks;
                            currentTrackIndex = -1;
                            renderPlaylist();
                            loadTrack(0);
                            setTimeout(() => audio.play().catch(console.error), 100);
                            // ハンドルをIndexedDBに保存して永続化
                            await saveDirectoryHandle(dirHandle);
                        }
                    } catch (err) {
                        if (err.name !== 'AbortError') console.error('Folder picker error:', err);
                    }
                } else {
                    // フォールバック: webkitdirectory を使ったフォルダ選択
                    folderInputFallback.click();
                }
            });
        }

        if (folderInputFallback) {
            folderInputFallback.addEventListener('change', (e) => {
                const tracks = filterAudioFiles(e.target.files);
                if (tracks.length > 0) {
                    playlistFiles = tracks;
                    currentTrackIndex = -1;
                    renderPlaylist();
                    loadTrack(0);
                    setTimeout(() => audio.play().catch(console.error), 100);
                }
                e.target.value = '';
            });
        }

        // 起動時に保存済みディレクトリハンドルから自動復元
        if (!window.electronAPI && 'showDirectoryPicker' in window) {
            window.addEventListener('load', async () => {
                try {
                    const savedHandle = await loadDirectoryHandle();
                    if (!savedHandle) return;
                    // ページ読み込み時に自動で権限確認
                    const perm = await savedHandle.queryPermission({ mode: 'read' });
                    if (perm === 'granted') {
                        const tracks = await readAudioFilesFromHandle(savedHandle);
                        if (tracks.length > 0) {
                            playlistFiles = tracks;
                            renderPlaylist();
                            loadTrack(0);
                        }
                    }
                    // perm === 'prompt' の場合はユーザーがフォルダボタンを押したときに再取得
                } catch (e) {
                    console.log('Auto-load from saved folder skipped:', e);
                }
            });
        }

        // デザイン・システム設定
        // シークバーの進行部分を薄いシアンに変更
        const ACCENT_COLOR = '#00e5ff';
        const PROGRESS_FILL_COLOR = 'rgba(0, 229, 255, 0.35)'; // 再生済み部分を薄いシアンに
        const TRACK_BG = 'var(--track-bg)';

        // =========================================================
        // イベントリスナーの登録
        // =========================================================

        // --- バックグラウンド・スリープ時再生維持 ---
        let userIntentPaused = false;
        let bgKeepAliveTimer = null;
        let webLockHeld = null; // Web Locks API のリリース用

        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => {
                userIntentPaused = false;
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                togglePlay();
            });
            navigator.mediaSession.setActionHandler('pause', () => {
                userIntentPaused = true;
                togglePlay();
            });
            navigator.mediaSession.setActionHandler('previoustrack', playPrev);
            navigator.mediaSession.setActionHandler('nexttrack', playNext);
        }

        // ページがバックグラウンド/フォアグラウンド切替時にAudioContextを復帰
        document.addEventListener('visibilitychange', () => {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().catch(() => {});
            }
            if (document.visibilityState === 'visible' && !userIntentPaused && audio.paused && playlistFiles.length > 0) {
                audio.play().catch(() => {});
            }
        });

        // AudioContextのstate変化を監視して自動復帰
        function watchAudioContextState() {
            if (!audioCtx) return;
            audioCtx.addEventListener('statechange', () => {
                if (audioCtx.state === 'suspended' && !audio.paused) {
                    audioCtx.resume().catch(() => {});
                }
            });
        }

        /**
         * Web Locks API でブラウザにページのサスペンドを抑制させる
         * 再生開始時に取得し、一時停止時に解放する
         */
        function acquireWebLock() {
            if (webLockHeld || !navigator.locks) return;
            navigator.locks.request('glass-music-playback', { mode: 'exclusive' }, () => {
                return new Promise((resolve) => {
                    webLockHeld = resolve; // resolveを呼べばロック解放
                });
            }).catch(() => {});
        }
        function releaseWebLock() {
            if (webLockHeld) {
                webLockHeld();
                webLockHeld = null;
            }
        }

        /**
         * 定期的にAudioContextを復帰させるタイマー
         * スリープから復帰した際にも安定して再開させる
         */
        function startKeepAlive() {
            stopKeepAlive();
            acquireWebLock();
            bgKeepAliveTimer = setInterval(() => {
                if (audioCtx && audioCtx.state === 'suspended' && !userIntentPaused) {
                    audioCtx.resume().catch(() => {});
                }
                // audio要素がブラウザにより停止されていたら再開
                if (!userIntentPaused && audio.paused && audio.src && playlistFiles.length > 0) {
                    audio.play().catch(() => {});
                }
            }, 3000); // 3秒ごとにチェック
        }
        function stopKeepAlive() {
            if (bgKeepAliveTimer) {
                clearInterval(bgKeepAliveTimer);
                bgKeepAliveTimer = null;
            }
            releaseWebLock();
        }

        // 再生開始/停止に連動してキープアライブを制御
        audio.addEventListener('play', () => { startKeepAlive(); });
        audio.addEventListener('pause', () => {
            if (userIntentPaused) stopKeepAlive();
        });

        playBtn.addEventListener('click', () => {
            userIntentPaused = audio.paused ? false : true;
            togglePlay();
        });
        prevBtn.addEventListener('click', () => { userIntentPaused = false; playPrev(); });
        nextBtn.addEventListener('click', () => { userIntentPaused = false; playNext(); });
        shuffleBtn.addEventListener('click', () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active', isShuffle);
            shuffleBtn.style.color = isShuffle ? 'var(--accent)' : '';
        });
        seekBar.addEventListener('input', seekTo);
        volumeBar.addEventListener('input', updateVolume);
        
        playlistToggle.addEventListener('click', () => {
            playlistSection.classList.toggle('show');
            if (playlistSection.classList.contains('show')) {
                playlistToggle.style.color = 'var(--accent)';
                playlistToggle.style.background = 'rgba(255,255,255,0.12)';
            } else {
                playlistToggle.style.color = '';
                playlistToggle.style.background = '';
            }
        });

        // オーディオのイベント
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', () => {
            seekBar.max = audio.duration || 100;
            durationEl.textContent = formatTime(audio.duration || 0);
        });
        audio.addEventListener('ended', () => { userIntentPaused = false; playNext(); });
        
        audio.addEventListener('play', syncPlayState);
        audio.addEventListener('pause', syncPlayState);

        // =========================================================
        // 初期状態・背景のUI更新
        // =========================================================
        initVolume();
        updateSliderBackground(seekBar, 0); // 初期シークバーは0

        function updateSliderBackground(slider, percentage) {
            // valueではなく実際の割合(%)を受け取り、プログレスカラー（白の半透明）で塗りつぶす
            slider.style.background = `linear-gradient(to right, ${PROGRESS_FILL_COLOR} ${percentage}%, ${TRACK_BG} ${percentage}%)`;
        }
        
        function initVolume() {
            audio.volume = volumeBar.value;
            updateSliderBackground(volumeBar, audio.volume * 100);
        }

        // =========================================================
        // 3D Audio & EQ (Web Audio API) 実装
        // =========================================================
        let audioCtx;
        let sourceNode;
        // 3D Nodes
        let pannerNode;
        let filterNode;
        let dryGainNode;
        let wetGainNode;
        let convolverNode;
        // EQ Nodes
        let eqBass;
        let eqMid;
        let eqTreble;

        let is3DEnabled = false;
        let isAutoPan = false;
        let panValue = 0;
        let panDirection = 1;
        let autoPanAnimFrame;

        function createReverbIR(ctx) {
            const sampleRate = ctx.sampleRate;
            const length = sampleRate * 2.5; // 2.5秒の残響
            const impulse = ctx.createBuffer(2, length, sampleRate);
            const left = impulse.getChannelData(0);
            const right = impulse.getChannelData(1);
            for (let i = 0; i < length; i++) {
                // 指数減衰によるホワイトノイズ（簡略化された部屋・ホールのIR）
                const decay = Math.exp(-i / (sampleRate * 0.5));
                left[i] = (Math.random() * 2 - 1) * decay;
                right[i] = (Math.random() * 2 - 1) * decay;
            }
            return impulse;
        }

        /** 初回操作時にAudioContextを初期化する（ブラウザの静音ポリシー対策） */
        function initWebAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            // 既存の <audio> 要素から音源を生成
            sourceNode = audioCtx.createMediaElementSource(audio);
            
            // ====== 3D Audio (HRTF + Reverb) ======
            pannerNode = audioCtx.createPanner();
            pannerNode.panningModel = 'HRTF';
            pannerNode.distanceModel = 'inverse';
            pannerNode.refDistance = 1;
            pannerNode.maxDistance = 10000;
            pannerNode.rolloffFactor = 1;

            const listener = audioCtx.listener;
            if (listener.positionX) {
                listener.positionX.value = 0;
                listener.positionY.value = 0;
                listener.positionZ.value = 0;
                listener.forwardX.value = 0;
                listener.forwardY.value = 0;
                listener.forwardZ.value = -1;
                listener.upX.value = 0;
                listener.upY.value = 1;
                listener.upZ.value = 0;
            } else {
                listener.setPosition(0,0,0);
                listener.setOrientation(0,0,-1, 0,1,0); 
            }

            convolverNode = audioCtx.createConvolver();
            convolverNode.buffer = createReverbIR(audioCtx);

            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = 'lowpass';
            dryGainNode = audioCtx.createGain();
            wetGainNode = audioCtx.createGain();
            wetGainNode.gain.value = 0;

            // ====== Equalizer ======
            eqBass = audioCtx.createBiquadFilter();
            eqBass.type = 'lowshelf';
            eqBass.frequency.value = 150; // 150Hz以下の低音

            eqMid = audioCtx.createBiquadFilter();
            eqMid.type = 'peaking';
            eqMid.frequency.value = 1000; // 1kHzの中音
            eqMid.Q.value = 1.0;

            eqTreble = audioCtx.createBiquadFilter();
            eqTreble.type = 'highshelf';
            eqTreble.frequency.value = 4000; // 4kHz以上の高音

            // 初期状態はソースからDestinationへ直接出力 (ルーティング更新前)
            sourceNode.connect(audioCtx.destination);

            // AudioContextの中断を監視して自動復帰
            watchAudioContextState();
        }

        function updateAudioRouting() {
            if (!audioCtx) return;
            
            // Contextがsuspend状態から復帰させる
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // 全て切断
            sourceNode.disconnect();
            try { filterNode.disconnect(); } catch(e){}
            try { pannerNode.disconnect(); } catch(e){}
            try { dryGainNode.disconnect(); } catch(e){}
            try { wetGainNode.disconnect(); } catch(e){}
            try { convolverNode.disconnect(); } catch(e){}
            try { eqBass.disconnect(); } catch(e){}
            try { eqMid.disconnect(); } catch(e){}
            try { eqTreble.disconnect(); } catch(e){}

            const now = audioCtx.currentTime;

            // ルーティング再構築: Source -> eqBass -> eqMid -> eqTreble
            sourceNode.connect(eqBass);
            eqBass.connect(eqMid);
            eqMid.connect(eqTreble);

            if (is3DEnabled) {
                // 3D効果ON: EQ -> Filter -> Panner -> [Dry/Wet] -> Destination
                eqTreble.connect(filterNode);
                filterNode.connect(pannerNode);

                pannerNode.connect(dryGainNode);
                dryGainNode.connect(audioCtx.destination);

                pannerNode.connect(convolverNode);
                convolverNode.connect(wetGainNode);
                wetGainNode.connect(audioCtx.destination);

                filterNode.frequency.cancelScheduledValues(now);
                dryGainNode.gain.cancelScheduledValues(now);
                wetGainNode.gain.cancelScheduledValues(now);
                if (pannerNode.positionX) {
                    pannerNode.positionX.cancelScheduledValues(now);
                    pannerNode.positionZ.cancelScheduledValues(now);
                }

                // 空間の奥行きを出すため高音を適度にカット
                filterNode.frequency.setTargetAtTime(10000, now, 0.1);
                
                sliderReverb.disabled = false;
                const reverbVal = parseFloat(sliderReverb.value);
                // ドライ音量（元音）とウェット音量（残響）を調整
                dryGainNode.gain.setTargetAtTime(1.0 - (reverbVal * 0.3), now, 0.1);
                wetGainNode.gain.setTargetAtTime(reverbVal * 1.5, now, 0.1);
                
                toggleAutoPan.disabled = false;
                
                if (isAutoPan) {
                    startAutoPan();
                } else {
                    stopAutoPan();
                    updatePannerPosition(panValue); // 現在の角度を維持
                }
            } else {
                // 3D効果OFF：EQ出力をそのままDestinationへ
                eqTreble.connect(audioCtx.destination);
                
                sliderReverb.disabled = true;
                toggleAutoPan.disabled = true;
                stopAutoPan();
            }
        }

        function updatePannerPosition(val) {
            if (!pannerNode || !audioCtx) return;
            // -1 〜 1 の値を、リスナー周囲の円軌道（半径3）に変換
            // theta を -π 〜 π にして1周させる
            const theta = val * Math.PI;
            const radius = 3;
            const x = Math.sin(theta) * radius;
            const z = -Math.cos(theta) * radius; // 0のときz=-3(前方), 1のときz=3(後方)
            const now = audioCtx.currentTime;
            
            if (pannerNode.positionX) {
                pannerNode.positionX.setTargetAtTime(x, now, 0.05);
                pannerNode.positionY.setTargetAtTime(0, now, 0.05);
                pannerNode.positionZ.setTargetAtTime(z, now, 0.05);
            } else {
                pannerNode.setPosition(x, 0, z);
            }
        }

        function autoPanLoop() {
            if (!is3DEnabled || !isAutoPan) return;
            
            // リスナーの周りをゆっくり1周し続ける
            panValue += 0.002;
            if (panValue > 1) { panValue = -1; } // ループ
            
            updatePannerPosition(panValue);
            
            autoPanAnimFrame = requestAnimationFrame(autoPanLoop);
        }

        function startAutoPan() {
            if (!autoPanAnimFrame) autoPanLoop();
        }

        function stopAutoPan() {
            if (autoPanAnimFrame) {
                cancelAnimationFrame(autoPanAnimFrame);
                autoPanAnimFrame = null;
            }
        }

        // --- 3D & EQ Audio UI イベント ---
        btn3d.addEventListener('click', (e) => {
            e.stopPropagation();
            panel3d.classList.toggle('show');
            panelEq.classList.remove('show');
            btn3d.style.color = panel3d.classList.contains('show') ? 'var(--accent)' : '';
            btnEq.style.color = '';
        });

        if (btnEq) {
            btnEq.addEventListener('click', (e) => {
                e.stopPropagation();
                panelEq.classList.toggle('show');
                panel3d.classList.remove('show');
                btnEq.style.color = panelEq.classList.contains('show') ? 'var(--accent)' : '';
                btn3d.style.color = '';
            });
        }

        // パネル外クリックでパネル等を閉じる
        document.addEventListener('click', (e) => {
            if (panel3d && !panel3d.contains(e.target) && !btn3d.contains(e.target)) {
                panel3d.classList.remove('show');
                btn3d.style.color = '';
            }
            if (panelEq && !panelEq.contains(e.target) && btnEq && !btnEq.contains(e.target)) {
                panelEq.classList.remove('show');
                btnEq.style.color = '';
            }
        });

        toggle3dEffect.addEventListener('change', (e) => {
            initWebAudio(); // ユーザーの操作を起点にInit
            is3DEnabled = e.target.checked;
            updateAudioRouting();
        });

        sliderReverb.addEventListener('input', (e) => {
            if (is3DEnabled && audioCtx) {
                const val = parseFloat(e.target.value);
                updateSliderBackground(e.target, val);
                const now = audioCtx.currentTime;
                dryGainNode.gain.setTargetAtTime(1.0 - (val * 0.3), now, 0.1);
                wetGainNode.gain.setTargetAtTime(val * 1.5, now, 0.1);
            }
        });

        toggleAutoPan.addEventListener('change', (e) => {
            isAutoPan = e.target.checked;
            updateAudioRouting();
        });

        // --- EQ スライダー・プリセット イベント ---
        function updateEQSliderBackground(slider) {
            // -10〜10を0〜100%にマッピング (-10 = 0%, 0 = 50%, 10 = 100%)
            const percentage = ((parseFloat(slider.value) + 10) / 20) * 100;
            slider.style.background = `linear-gradient(to right, rgba(0, 229, 255, 0.5) ${percentage}%, var(--track-bg) ${percentage}%)`;
        }

        [eqBassSlider, eqMidSlider, eqTrebleSlider].forEach(slider => {
            if(!slider) return;
            updateEQSliderBackground(slider);
            slider.addEventListener('input', (e) => {
                initWebAudio();
                updateEQSliderBackground(e.target);
                const val = parseFloat(e.target.value);
                
                if (e.target.id === 'eq-bass' && eqBass) eqBass.gain.value = val;
                if (e.target.id === 'eq-mid' && eqMid) eqMid.gain.value = val;
                if (e.target.id === 'eq-treble' && eqTreble) eqTreble.gain.value = val;
                
                // 手動操作時、プリセットを外す
                presetBtns.forEach(b => b.classList.remove('active'));
            });
        });

        const presets = {
            normal: { bass: 0, mid: 0, treble: 0 },
            bass: { bass: 6, mid: -2, treble: 1 },
            vocal: { bass: -2, mid: 5, treble: 2 },
            treble: { bass: -2, mid: 1, treble: 5 }
        };

        presetBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                initWebAudio();
                
                presetBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                const presetKey = e.target.getAttribute('data-preset');
                const preset = presets[presetKey] || presets.normal;
                
                if (eqBassSlider) { eqBassSlider.value = preset.bass; updateEQSliderBackground(eqBassSlider); }
                if (eqMidSlider) { eqMidSlider.value = preset.mid; updateEQSliderBackground(eqMidSlider); }
                if (eqTrebleSlider) { eqTrebleSlider.value = preset.treble; updateEQSliderBackground(eqTrebleSlider); }
                
                if (eqBass) eqBass.gain.value = preset.bass;
                if (eqMid) eqMid.gain.value = preset.mid;
                if (eqTreble) eqTreble.gain.value = preset.treble;
            });
        });


        // =========================================================
        // プレイヤの機能実装
        // =========================================================

        /**
         * 1. プレイリストを画面に描画
         */
        function renderPlaylist() {
            playlistEl.innerHTML = '';
            
            playlistFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = `playlist-item ${index === currentTrackIndex ? 'active' : ''}`;
                
                const icon = document.createElement('span');
                icon.className = 'material-symbols-rounded';
                icon.textContent = (index === currentTrackIndex && !audio.paused) ? 'graphic_eq' : 'music_note';
                
                const text = document.createElement('span');
                text.textContent = file.name.replace(/\.[^/.]+$/, "");
                text.style.overflow = 'hidden';
                text.style.textOverflow = 'ellipsis';
                text.style.whiteSpace = 'nowrap';
                text.style.flex = '1';
                
                li.appendChild(icon);
                li.appendChild(text);
                
                li.addEventListener('click', () => {
                    if (currentTrackIndex === index) {
                        togglePlay(); 
                    } else {
                        loadTrack(index);
                        audio.play().catch(e => console.error(e));
                    }
                });
                
                playlistEl.appendChild(li);
            });
            
            // プレイリストが空でない場合はトグルボタンの色を明るく
            if (playlistFiles.length > 0 && !playlistSection.classList.contains('show')) {
                playlistToggle.style.color = 'var(--text-primary)';
            }
        }

        /**
         * Media Session API を用いてスマホ等のロック画面・通知領域向けのメタデータを更新
         */
        function updateMediaSessionMetadata(title, artist, album, artworkUrl) {
            if ('mediaSession' in navigator) {
                const metadataParams = {
                    title: title || 'Unknown Track',
                    artist: artist || '',
                    album: album || ''
                };
                if (artworkUrl) {
                    metadataParams.artwork = [
                        { src: artworkUrl, sizes: '512x512', type: 'image/jpeg' } // 表示用のサムネイル指定
                    ];
                }
                navigator.mediaSession.metadata = new window.MediaMetadata(metadataParams);
            }
        }

        /**
         * 3. 曲の読み込み
         */
        function loadTrack(index) {
            if (playlistFiles.length === 0) return;
            
            currentTrackIndex = index;
            const file = playlistFiles[index];
            
            if (file.isElectronFile) {
                // Electron経由での絶対パス再生物理ファイル（URLエンコード処置）
                audio.src = 'file:///' + encodeURI(file.path.replace(/\\/g, '/')).replace(/#/g, '%23').replace(/\?/g, '%3F');
            } else if (file.path) {
                // Web環境: 既に生成済みのblob URLを使用
                audio.src = file.path;
            } else {
                audio.src = URL.createObjectURL(file);
            }
            
            trackNameEl.textContent = file.name.replace(/\.[^/.]+$/, "");
            artistNameEl.textContent = "Unknown Artist";
            albumArtEl.style.display = 'none';
            albumArtEl.style.opacity = '0';
            albumPlaceholder.style.display = 'block';
            
            // シークバー初期化
            seekBar.value = 0;
            updateSliderBackground(seekBar, 0);

            // デフォルト情報でMedia Sessionを初期化
            updateMediaSessionMetadata(trackNameEl.textContent, "Unknown Artist", "", null);
            
            // 共通のID3処理関数
            const handleID3Tags = (tags, defaultTitle) => {
                if (tags.title) trackNameEl.textContent = tags.title;
                if (tags.artist) artistNameEl.textContent = tags.artist;
                
                trackNameEl.title = trackNameEl.textContent;
                artistNameEl.title = artistNameEl.textContent;
                
                let artworkUrl = null;
                if (tags.picture) {
                    const { data, format } = tags.picture;
                    const byteArray = new Uint8Array(data);
                    const blob = new Blob([byteArray], { type: format });
                    artworkUrl = URL.createObjectURL(blob);
                    
                    albumArtEl.onload = () => {
                        albumArtEl.style.display = 'block';
                        setTimeout(() => albumArtEl.style.opacity = '1', 50); // フェードイン
                        albumPlaceholder.style.display = 'none';
                    };
                    albumArtEl.src = artworkUrl;
                }

                updateMediaSessionMetadata(
                    tags.title || defaultTitle,
                    tags.artist || "Unknown Artist",
                    tags.album || "",
                    artworkUrl
                );
            };

            if (window.jsmediatags) {
                if (file.isElectronFile) {
                    // Electronパスの場合はfetchでBlob化してjsmediatagsに渡す
                    fetch(audio.src)
                        .then(res => res.blob())
                        .then(blob => {
                            window.jsmediatags.read(blob, {
                                onSuccess: function(tag) { handleID3Tags(tag.tags, trackNameEl.textContent); },
                                onError: function(e) { console.log('ID3 読み込みスキップ: ', e); }
                            });
                        })
                        .catch(e => console.log('Fetch error for local cover art: ', e));
                } else {
                    // 通常のローカルブラウザアップロードファイル
                    window.jsmediatags.read(file.rawFile || file, {
                        onSuccess: function(tag) { handleID3Tags(tag.tags, trackNameEl.textContent); },
                        onError: function(e) { console.log('ID3 読み込みスキップ: ', e); }
                    });
                }
            }

            renderPlaylist();
        }

        /**
         * 4. 再生 / 一時停止の切り替え
         */
        function togglePlay() {
            if (playlistFiles.length === 0) return;
            
            if (audio.paused) {
                audio.play().catch(e => console.error("Play prevented:", e));
            } else {
                audio.pause();
            }
        }

        /**
         * 音声の再生状態とUIの同期
         */
        function syncPlayState() {
            if (audio.paused) {
                playIcon.textContent = 'play_arrow';
                albumContainer.classList.remove('playing');
                isWavePlaying = false; // 背景波形停止指示
            } else {
                playIcon.textContent = 'pause';
                albumContainer.classList.add('playing');
                isWavePlaying = true; // 背景波形再生指示
            }
            renderPlaylist();
        }

        /**
         * 5. 次の曲へ
         */
        function playNext() {
            if (playlistFiles.length === 0) return;
            let nextIndex = currentTrackIndex + 1;
            
            if (isShuffle) {
                if (playlistFiles.length > 1) {
                    let randIndex = currentTrackIndex;
                    while(randIndex === currentTrackIndex) {
                        randIndex = Math.floor(Math.random() * playlistFiles.length);
                    }
                    nextIndex = randIndex;
                } else {
                    nextIndex = 0;
                }
            } else {
                if (nextIndex >= playlistFiles.length) {
                    nextIndex = 0;
                }
            }
            loadTrack(nextIndex);
            audio.play().catch(e => console.error(e));
        }

        /**
         * 6. 前の曲へ
         */
        function playPrev() {
            if (playlistFiles.length === 0) return;
            
            // 曲の最初数秒であれば曲の先頭に戻す
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
                return;
            }
            
            let prevIndex = currentTrackIndex - 1;
            if (isShuffle) {
                if (playlistFiles.length > 1) {
                    let randIndex = currentTrackIndex;
                    while(randIndex === currentTrackIndex) {
                        randIndex = Math.floor(Math.random() * playlistFiles.length);
                    }
                    prevIndex = randIndex;
                } else {
                    prevIndex = 0;
                }
            } else {
                if (prevIndex < 0) {
                    prevIndex = playlistFiles.length - 1;
                }
            }
            loadTrack(prevIndex);
            audio.play().catch(e => console.error(e));
        }

        /**
         * 7. シークバーの更新 (audio -> UI)
         */
        function updateProgress() {
            if (isNaN(audio.duration)) return;
            
            seekBar.value = audio.currentTime;
            currentTimeEl.textContent = formatTime(audio.currentTime);
            
            // シークバーの背景色をアクセントカラーで塗りつぶす
            const progress = (audio.currentTime / audio.duration) * 100;
            updateSliderBackground(seekBar, progress);
        }

        /**
         * 8. 再生位置の変更 (UI -> audio)
         */
        function seekTo() {
            audio.currentTime = seekBar.value;
            // つまみをドラッグ中も背景色をリアルタイムに更新
            if(audio.duration) {
                const progress = (seekBar.value / audio.duration) * 100;
                updateSliderBackground(seekBar, progress);
            }
        }

        /**
         * 9. 音量調整
         */
        function updateVolume(e) {
            audio.volume = e.target.value;
            
            if (audio.volume === 0) {
                volIcon.textContent = 'volume_off';
            } else if (audio.volume < 0.4) {
                volIcon.textContent = 'volume_down';
            } else {
                volIcon.textContent = 'volume_up';
            }
            
            // 音量バーの背景色更新
            const progress = audio.volume * 100;
            updateSliderBackground(volumeBar, progress);
        }

        /**
         * 10. 時刻フォーマット
         */
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }


        // =========================================================
        // 背景の簡易波形アニメーション (Canvas)
        // =========================================================
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let isWavePlaying = false;
        let time = 0;
        let waves = [];

        // Canvasサイズをプレイヤーカードに合わせて初期化
        const playerCard = document.querySelector('.player-card');
        function resize() {
            const rect = playerCard.getBoundingClientRect();
            width = canvas.width = rect.width;
            height = canvas.height = rect.height;
            initWaves();
        }
        window.addEventListener('resize', resize);
        
        // 波形の初期設定（カードサイズに合わせた振幅・位置）
        function initWaves() {
            waves = [];
            const waveCount = 4;
            for (let i = 0; i < waveCount; i++) {
                waves.push({
                    yOffset: height * 0.4 + (Math.random() * height * 0.3), // カード内で分散
                    amplitude: 15 + Math.random() * 30, // カード内に収まる振幅
                    frequency: 0.008 + Math.random() * 0.012, // カード幅に合わせた周波数
                    speed: 0.015 + Math.random() * 0.025, // ゆっくり滑らか
                    phase: Math.random() * Math.PI * 2,
                    color: i === 0 ? 'rgba(0, 229, 255, 0.5)' :  // メインのシアン波
                           i === 1 ? 'rgba(0, 229, 255, 0.3)' :  // サブのシアン波
                           i === 2 ? 'rgba(255, 255, 255, 0.2)' : // 白い波
                           'rgba(255, 255, 255, 0.1)'
                });
            }
        }

        function drawWave() {
            ctx.clearRect(0, 0, width, height);
            
            // 再生中は波が大きく動き、停止中は穏やかに揺れる
            const targetMultiplier = isWavePlaying ? 1.8 : 0.5;
            time += isWavePlaying ? 1.2 : 0.3;

            waves.forEach(w => {
                ctx.beginPath();
                
                // カード幅に合わせて5pxごとに描画（より滑らか）
                for (let x = 0; x <= width; x += 5) {
                    const y = w.yOffset + Math.sin(x * w.frequency + time * w.speed + w.phase) * (w.amplitude * targetMultiplier);
                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.strokeStyle = w.color;
                ctx.lineWidth = 1.5; // 少し太めにして見えやすく
                ctx.stroke();
            });

            requestAnimationFrame(drawWave);
        }

        // 初期化とアニメーションスタート
        resize();
        drawWave();

    </script>
</body>
</html>
